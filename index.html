<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Dashboard</title>
		<link rel="stylesheet" href="style.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<div class="container">
			<!-- HEADER -->
			<header class="header">
				<div class="search-bar">
					<span>Search</span><input type="text" name="searchTerm" id="search" />
				</div>

				<div class="account-menus">
					<span>Notifications</span>
					<span>Avatar</span>
					<span>Morgan Oakley</span>
				</div>

				<div class="account-brief">
					<div class="avatar">
						<span class="span">Avatar</span>
					</div>

					<div class="text">
						<span class="leading">Hi there,</span>
						<h1>Morgan Oakley (@morgan)</h1>
					</div>
				</div>

				<div class="actions">
					<button class="btn">New</button>
					<button class="btn">Upload</button>
					<button class="btn">Share</button>
				</div>
			</header>

			<!-- SIDEBAR -->
			<div class="sidebar">
				<div class="logo"><span>Dashboard</span></div>

				<nav class="nav">
					<ul class="menus">
						<li class="menu"><a href="#">Home</a></li>
						<li class="menu"><a href="#">Profile</a></li>
						<li class="menu"><a href="#">Messages</a></li>
						<li class="menu"><a href="#">History</a></li>
						<li class="menu"><a href="#">Tasks</a></li>
						<li class="menu"><a href="#">Communities</a></li>
					</ul>

					<ul class="settings">
						<li class="setting"><a href="#">Settings</a></li>
						<li class="setting"><a href="#">Support</a></li>
						<li class="setting"><a href="#">Privacy</a></li>
					</ul>
				</nav>
			</div>
			<main class="main">Main</main>
		</div>

		<script src="//code.iconify.design/1/1.0.6/iconify.min.js"></script>
	</body>
</html>
