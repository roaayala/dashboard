<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Dashboard</title>
		<link rel="stylesheet" href="style.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<div class="container">
			<!-- HEADER -->
			<header class="header">
				<div class="search-bar">
					<div class="search-bar__icon">
						<span class="iconify" data-icon="mdi-search"></span>
					</div>
					<input type="text" name="searchTerm" id="search" />
				</div>

				<div class="account-menus">
					<div class="account-menus__icon">
						<span class="iconify" data-icon="mdi-bell-notification"></span>
					</div>
					<div class="account-menus__avatar"></div>
					<span class="account-menus__text">Morgan Oakley</span>
				</div>

				<div class="account-brief">
					<div class="avatar">
						<span class="span">Avatar</span>
					</div>

					<div class="text">
						<span class="leading">Hi there,</span>
						<h1>Morgan Oakley (@morgan)</h1>
					</div>
				</div>

				<div class="actions">
					<button class="btn">New</button>
					<button class="btn">Upload</button>
					<button class="btn">Share</button>
				</div>
			</header>

			<!-- SIDEBAR -->
			<div class="sidebar">
				<div class="logo">
					<div class="logo__image">
						<span class="iconify" data-icon="mdi-view-grid"></span>
					</div>
					<p class="logo__text">Dashboard</p>
				</div>

				<nav class="nav">
					<ul class="menus">
						<li class="menu">
							<div class="menu__icon">
								<span class="iconify" data-icon="mdi-home"></span>
							</div>
							<a href="#" class="menu__text">Home</a>
						</li>

						<li class="menu">
							<div class="menu__icon">
								<span
									class="iconify"
									data-icon="mdi-card-account-details"
								></span>
							</div>
							<a href="#" class="menu__text">Profile</a>
						</li>

						<li class="menu">
							<div class="menu__icon">
								<span class="iconify" data-icon="mdi-message"></span>
							</div>
							<a href="#" class="menu__text">Messages</a>
						</li>

						<li class="menu">
							<div class="menu__icon">
								<span class="iconify" data-icon="mdi-history"></span>
							</div>
							<a href="#" class="menu__text">History</a>
						</li>

						<li class="menu">
							<div class="menu__icon">
								<span class="iconify" data-icon="mdi-list-box"></span>
							</div>
							<a href="#" class="menu__text">Tasks</a>
						</li>

						<li class="menu">
							<div class="menu__icon">
								<span class="iconify" data-icon="mdi-account-group"></span>
							</div>
							<a href="#" class="menu__text">Communities</a>
						</li>
					</ul>

					<ul class="settings">
						<li class="setting">
							<div class="setting__icon">
								<span class="iconify" data-icon="mdi-settings"></span>
							</div>
							<a href="#" class="setting__text">Settings</a>
						</li>

						<li class="setting">
							<div class="setting__icon">
								<span class="iconify" data-icon="mdi-support"></span>
							</div>
							<a href="#" class="setting__text">Support</a>
						</li>

						<li class="setting">
							<div class="setting__icon">
								<span class="iconify" data-icon="mdi-shield-check"></span>
							</div>
							<a href="#" class="setting__text">Privacy</a>
						</li>
					</ul>
				</nav>
			</div>
			<main class="main">Main</main>
		</div>

		<script src="//code.iconify.design/1/1.0.6/iconify.min.js"></script>
	</body>
</html>
